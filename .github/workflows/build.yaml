name: Build project
on: pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: extractions/setup-just@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - run: just build
